  <h1>Termo da Shopee</h1>

  <div class="regras">

    <p><span class="verde">Verde</span>:
      letra correta na posição correta.</p>

    <p><span class="amarelo">Amarelo</span>:
      letra existe mas está na posição errada.</p>

    <p><span class="cinza">Cinza</span>:
      letra não existe na palavra.</p>

    <p>
      Acentos são automáticos e
      palavras podem repetir letras.
    </p>

    <p>
      Nova palavra disponível a cada rodada.
    </p>

  </div>
